name: firstCI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download dependencies
        run: |
          python -m pip install --upgrade pip
          echo "Dependencies updated"

      - name: Create project build
        run: |
          mkdir -p build_output
          echo "Build created on $(date)" > build_output/result.txt

      - name: Run unit tests
        run: |
          if [ -d "build_output" ]; then echo "Success!"; else exit 1; fi

      - name: Update repository code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          date > ci_status.txt
          git add ci_status.txt
          git commit -m "verify CI execution [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main
